<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios de IA - Azure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="text-center mb-5">
                    <h2 class="fw-bold">Servicios de IA con Azure</h2>
                    <p class="text-muted">Selecciona un servicio para comenzar</p>
                </div>

                <div class="row g-4">

                    <!-- OCR -->
                    <div class="col-6">
                        <a href="/ocr" class="text-decoration-none">
                            <div class="card h-100 shadow-sm border-0 text-center p-3">
                                <div class="card-body">
                                    <i class="bi bi-image fs-1 text-primary mb-3 d-block"></i>
                                    <h5 class="card-title fw-semibold text-dark">Azure OCR</h5>
                                    <p class="card-text text-muted small">Extrae texto de imágenes</p>
                                </div>
                            </div>
                        </a>
                    </div>

                    <!-- PLN -->
                    <div class="col-6">
                        <a href="/sentimientos" class="text-decoration-none">
                            <div class="card h-100 shadow-sm border-0 text-center p-3">
                                <div class="card-body">
                                    <i class="bi bi-chat-heart fs-1 text-success mb-3 d-block"></i>
                                    <h5 class="card-title fw-semibold text-dark">Azure PLN</h5>
                                    <p class="card-text text-muted small">Análisis de sentimientos</p>
                                </div>
                            </div>
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
