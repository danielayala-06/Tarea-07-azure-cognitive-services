<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Sentimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="text-center mb-4">
                    <h2 class="fw-bold">Análisis de sentimientos</h2>
                    <p class="text-muted">Ingrese un texto en el textarea de abajo :D</p>
                </div>

                <!-- Formulario -->
                <div class="card bg-body-tertiary shadow border-0 mb-4">
                    <div class="card-body p-4">

                        <div id="textos-container">
                            <div class="texto-group mb-3">
                                <label class="form-label fw-semibold">Texto a Analizar</label>
                                <textarea class="form-control texto-input" rows="4" placeholder="Escribe aquí el texto a analizar..."></textarea>
                            </div>
                        </div>

                        <hr>

                        <button id="btn-analizar" class="btn btn-primary w-100 py-2 fw-semibold">
                            <i class="bi bi-search me-2"></i>Analizar sentimientos
                        </button>
                    </div>
                </div>

                <!-- Loading -->
                <div id="loading" class="text-center py-4 d-none">
                    <p class="text-muted">Esperando respuesta de AZURE...</p>
                </div>

                <!-- Error -->
                <div id="error-box" class="alert alert-danger d-none" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span id="error-msg"></span>
                </div>

                <!-- Resultados -->
                <div id="resultados" class="d-none">
                    <h5 class="fw-bold mb-3">
                        Resultados
                    </h5>
                    <div class="card border-0 shadow bg-body-tertiary">
                        
                        <div class="card-body">
                            
                            <p class="text-muted small fw-semibold mb-2">EL CONTENIDO DEL TEXTO ES: </p>
                            
                            <!-- BAR POSITIVO -->
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <span class="text-success small fw-semibold" style="min-width:72px">Positivo</span>
                                <div class="progress flex-grow-1" style="height:10px">
                                    <div id="bar-positivo" class="progress-bar bg-success"></div>
                                </div>
                                <span id="val-positivo" class="text-muted small" style="min-width:40px;text-align:right"></span>
                            </div>
                            
                            <!-- BAR NEGATIVO -->
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <span class="text-danger small fw-semibold" style="min-width:72px">Negativo</span>
                                <div class="progress flex-grow-1" style="height:10px">
                                    <div id="bar-negativo" class="progress-bar bg-danger"></div>
                                </div>
                                <span id="val-negativo" class="text-muted small" style="min-width:40px;text-align:right"></span>
                            </div>
                            
                            <!-- BAR NEUTRAL -->
                            <div class="d-flex align-items-center gap-2">
                                <span class="text-secondary small fw-semibold" style="min-width:72px">Neutral</span>
                                <div class="progress flex-grow-1" style="height:10px">
                                    <div id="bar-neutral" class="progress-bar bg-secondary"></div>
                                </div>
                                <span id="val-neutral" class="text-muted small" style="min-width:40px;text-align:right"></span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api/sentimientos.js"></script>
    <script src="/js/ui.js"></script>
</body>
</html>
